<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Antunes FM 97.1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(to bottom right, #0f172a, #0f1419, #0f172a);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-gradients {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .gradient-1 {
            position: absolute;
            top: 0;
            left: 25%;
            width: 384px;
            height: 384px;
            background: rgba(249, 115, 22, 0.05);
            border-radius: 50%;
            filter: blur(96px);
        }

        .gradient-2 {
            position: absolute;
            bottom: 0;
            right: 25%;
            width: 384px;
            height: 384px;
            background: rgba(34, 211, 238, 0.05);
            border-radius: 50%;
            filter: blur(96px);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .live-badge {
            display: inline-block;
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: #fb923c;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 64px;
            font-weight: 900;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .frequency {
            font-size: 48px;
            font-weight: 900;
            color: #fb923c;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .location {
            color: #94a3b8;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .waves {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin: 32px 0;
            height: 40px;
            align-items: center;
        }

        .wave {
            width: 4px;
            background: #fb923c;
            border-radius: 2px;
            animation: wave 0.6s ease-in-out infinite;
        }

        .wave:nth-child(1) { animation-delay: 0s; height: 20%; }
        .wave:nth-child(2) { animation-delay: 0.1s; height: 40%; }
        .wave:nth-child(3) { animation-delay: 0.2s; height: 60%; }
        .wave:nth-child(4) { animation-delay: 0.3s; height: 80%; }
        .wave:nth-child(5) { animation-delay: 0.4s; height: 100%; }
        .wave:nth-child(6) { animation-delay: 0.3s; height: 80%; }
        .wave:nth-child(7) { animation-delay: 0.2s; height: 60%; }
        .wave:nth-child(8) { animation-delay: 0.1s; height: 40%; }

        @keyframes wave {
            0%, 100% { height: 20%; }
            50% { height: 100%; }
        }

        .player-section {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(249, 115, 22, 0.15);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(8px);
            margin-bottom: 32px;
        }

        .now-playing {
            text-align: center;
            margin-bottom: 24px;
        }

        .now-playing-label {
            color: #94a3b8;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .now-playing-title {
            font-size: 24px;
            font-weight: bold;
            color: #06b6d4;
            margin-bottom: 16px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .play-button {
            width: 80px;
            height: 80px;
            background: #fb923c;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(249, 115, 22, 0.3);
        }

        .play-button:hover {
            background: #f97316;
            transform: scale(1.05);
        }

        .play-button:active {
            transform: scale(0.97);
        }

        .play-button svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .audio-info {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 16px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .volume-slider {
            width: 200px;
            height: 4px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 2px;
            appearance: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #fb923c;
            border-radius: 50%;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #fb923c;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .status-text {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-top: 16px;
        }

        .program-section {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(249, 115, 22, 0.15);
            border-radius: 16px;
            padding: 32px;
            backdrop-filter: blur(8px);
            margin-bottom: 32px;
            text-align: center;
        }

        .program-label {
            color: #fb923c;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .program-title {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }

        .program-description {
            color: #94a3b8;
            font-size: 14px;
        }

        .schedule-table {
            width: 100%;
            margin-top: 24px;
            border-collapse: collapse;
        }

        .schedule-table th {
            background: rgba(249, 115, 22, 0.1);
            color: #fb923c;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
        }

        .schedule-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            color: #cbd5e1;
        }

        .schedule-table tr:hover {
            background: rgba(249, 115, 22, 0.05);
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .nav a {
            color: #fb923c;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav a:hover {
            color: #f97316;
        }

        .nav-separator {
            color: #475569;
        }

        .footer {
            text-align: center;
            color: #64748b;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding-top: 32px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        audio {
            display: none;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 40px;
            }

            .frequency {
                font-size: 32px;
            }

            .play-button {
                width: 64px;
                height: 64px;
            }

            .play-button svg {
                width: 32px;
                height: 32px;
            }

            .volume-slider {
                width: 120px;
            }

            .schedule-table {
                font-size: 12px;
            }

            .schedule-table th,
            .schedule-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="background-gradients">
        <div class="gradient-1"></div>
        <div class="gradient-2"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="live-badge">● AO VIVO</div>
            <h1>RÁDIO<br>ANTUNES</h1>
            <div class="frequency">97.1 FM</div>
            <div class="location">Botucatu / SP — Transmissão ao Vivo</div>
        </div>

        <div class="waves" id="waves">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>

        <div class="player-section">
            <div class="now-playing">
                <div class="now-playing-label">Tocando Agora</div>
                <div class="now-playing-title">RÁDIO ANTUNES FM</div>
            </div>

            <div class="player-controls">
                <button class="play-button" id="playButton" onclick="togglePlay()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
            </div>

            <div class="audio-info">
                🎵 128 kbps | 🎧 AAC+
            </div>

            <div class="volume-control">
                <span>🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" onchange="setVolume()">
                <span>🔉</span>
            </div>

            <div class="status-text" id="status">Clique para ouvir</div>
        </div>

        <div class="program-section">
            <div class="program-label">Programa Atual</div>
            <div class="program-title" id="programTitle">Momento Paddock 🏎️</div>
            <div class="program-description" id="programDesc">Auto DJ — fora dos horários ao vivo</div>
            <div id="scheduleContainer"></div>
        </div>

        <nav class="nav">
            <a href="#sobre">Sobre</a>
            <span class="nav-separator">|</span>
            <a href="#galeria">Galeria</a>
            <span class="nav-separator">|</span>
            <a href="#contato">Contato</a>
        </nav>

        <div class="footer">
            © Rádio Antunes FM 97.1 · Botucatu/SP
        </div>
    </div>

    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const playButton = document.getElementById('playButton');
        const statusText = document.getElementById('status');
        const volumeSlider = document.getElementById('volumeSlider');
        const programTitle = document.getElementById('programTitle');
        const programDesc = document.getElementById('programDesc');
        const scheduleContainer = document.getElementById('scheduleContainer');
        const waves = document.getElementById('waves');

        let isPlaying = false;

        // Configurar stream
        audioPlayer.src = 'http://186.250.240.64:8096/stream';

        // Programação
        const schedule = [
            { start: 6, end: 12, name: 'Alvorada Sertaneja' },
            { start: 12, end: 14, name: 'Túnel do Tempo 1ª Edição' },
            { start: 14, end: 17, name: 'Tarde Sertaneja' },
            { start: 17, end: 18, name: 'Pagode Mania' },
            { start: 18, end: 21, name: 'Sertanejo 97' },
            { start: 21, end: 23, name: 'Túnel do Tempo 2ª Edição' },
            { start: 23, end: 25, name: 'Love Songs' },
        ];

        function togglePlay() {
            if (!isPlaying) {
                audioPlayer.play().catch(() => {
                    statusText.textContent = 'Tentando conectar...';
                    setTimeout(() => {
                        audioPlayer.play().catch(() => {
                            statusText.textContent = 'Indisponível no momento';
                        });
                    }, 2000);
                });
            } else {
                audioPlayer.pause();
            }
        }

        function setVolume() {
            audioPlayer.volume = volumeSlider.value / 100;
        }

        function updateProgram() {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const hour = now.getHours();

            if (dayOfWeek === 5) {
                // Sexta-feira
                let currentProgram = null;
                for (const prog of schedule) {
                    if (hour >= prog.start && hour < prog.end) {
                        currentProgram = prog;
                        break;
                    }
                }

                if (currentProgram) {
                    programTitle.textContent = currentProgram.name;
                    programDesc.textContent = `${currentProgram.start}:00 - ${currentProgram.end}:00`;
                } else {
                    programTitle.textContent = 'Momento Paddock 🏎️';
                    programDesc.textContent = 'Auto DJ — fora dos horários ao vivo';
                }

                // Mostrar tabela
                let html = '<table class="schedule-table"><thead><tr><th>Horário</th><th>Programa</th></tr></thead><tbody>';
                for (const prog of schedule) {
                    html += `<tr><td>${prog.start}:00 - ${prog.end}:00</td><td>${prog.name}</td></tr>`;
                }
                html += '</tbody></table>';
                scheduleContainer.innerHTML = html;
            } else {
                // Outros dias
                programTitle.textContent = 'Momento Paddock 🏎️';
                programDesc.textContent = 'Auto DJ — fora dos horários ao vivo';
                scheduleContainer.innerHTML = '<p style="color: #94a3b8; margin-top: 16px;">Transmissões ao vivo toda sexta-feira</p>';
            }
        }

        // Event listeners
        audioPlayer.addEventListener('playing', () => {
            isPlaying = true;
            statusText.textContent = 'Ao vivo ●';
            waves.style.opacity = '1';
            updatePlayButton();
        });

        audioPlayer.addEventListener('pause', () => {
            isPlaying = false;
            statusText.textContent = 'Parado';
            waves.style.opacity = '0.3';
            updatePlayButton();
        });

        audioPlayer.addEventListener('waiting', () => {
            statusText.textContent = 'Conectando...';
        });

        audioPlayer.addEventListener('error', () => {
            statusText.textContent = 'Reconectando...';
            waves.style.opacity = '0.3';
            if (isPlaying) {
                setTimeout(() => {
                    audioPlayer.play().catch(() => {
                        statusText.textContent = 'Indisponível no momento';
                        isPlaying = false;
                        updatePlayButton();
                    });
                }, 2000);
            }
        });

        function updatePlayButton() {
            if (isPlaying) {
                playButton.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/></svg>';
            } else {
                playButton.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            }
        }

        // Inicializar
        setVolume();
        updateProgram();
        setInterval(updateProgram, 60000);

        // Atualizar ondas
        waves.style.opacity = '0.3';
    </script>
</body>
</html>
